<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .login-box{
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            width:350px;
            text-align:center;
        }

        .login-box h2{
            margin-bottom:20px;
            color:#333;
        }

        .input-box{
            margin-bottom:15px;
            text-align:left;
        }

        .input-box label{
            display:block;
            margin-bottom:5px;
            color:#555;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        .input-box input:focus{
            border-color:#4facfe;
        }

        .btn{
            width:100%;
            padding:10px;
            border:none;
            border-radius:5px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#007bff;
        }

        .signup{
            margin-top:15px;
            font-size:14px;
        }

        .signup a{
            text-decoration:none;
            color:#007bff;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>

        <form action="#">
            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="signup">
                Don't have an account?
                <a href="#">Sign Up</a>
            </div>
        </form>
    </div>

</body>
</html>
